# Controllers for the SO-101 in Gazebo Harmonic (gz_ros2_control).
# Loaded by the gz_ros2_control-system plugin (see so101.gazebo.xacro).
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz — matches rw_rate="100" in so101.ros2_control.xacro
    use_sim_time: true

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: parallel_gripper_action_controller/GripperActionController

arm_controller:
  ros__parameters:
    joints:
      - shoulder_pan
      - shoulder_lift
      - elbow_flex
      - wrist_flex
      - wrist_roll
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0

gripper_controller:
  ros__parameters:
    joint: gripper
    state_interfaces:
      - position
      - velocity
    allow_stalling: true
    max_effort: 10.0
    stall_velocity_threshold: 0.001
    stall_timeout: 2.0
    goal_tolerance: 0.05
